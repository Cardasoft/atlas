<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f1216" />
    <title>Atlas DAM</title>
    <link data-trunk rel="rust" data-wasm-opt="z" />
    <style>
      :root {
        --bg: #0f1216;
        --panel: #171c24;
        --line: #283142;
        --txt: #e7edf5;
        --dim: #8b97a8;
        --accent: #5ac8fa;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--txt);
        font: 16px/1.5 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      .wrap { max-width: 820px; margin: 0 auto; padding: 40px 20px; }
      h1 { font-size: 28px; margin: 0 0 2px; }
      .dim { color: var(--dim); font-weight: 400; }
      .sub { color: var(--dim); margin: 0 0 24px; }
      .row { display: flex; gap: 10px; }
      .q {
        flex: 1; padding: 12px 14px; border-radius: 10px;
        border: 1px solid var(--line); background: var(--panel); color: var(--txt);
      }
      .q:focus { outline: 2px solid var(--accent); border-color: transparent; }
      .go {
        padding: 12px 18px; border-radius: 10px; border: 0; cursor: pointer;
        background: var(--accent); color: #04212e; font-weight: 600;
      }
      .status { color: var(--dim); margin: 14px 2px; }
      .results { list-style: none; padding: 0; margin: 0; }
      .results li {
        display: flex; justify-content: space-between; align-items: center; gap: 12px;
        padding: 12px 14px; border: 1px solid var(--line);
        border-radius: 10px; background: var(--panel); margin-bottom: 8px;
      }
      .title { font-weight: 500; }
      .meta { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
      .score { color: var(--dim); font-variant-numeric: tabular-nums; }

      /* Bandeau « mode dégradé » */
      .degraded {
        margin: 0 0 14px; padding: 10px 14px; border-radius: 10px;
        border: 1px solid #5a4a1e; background: #2a2310; color: #f0d894;
      }

      /* Compréhension de requête (query understanding) */
      .understand {
        display: flex; flex-wrap: wrap; align-items: center; gap: 8px 10px;
        margin: 0 2px 16px; padding: 10px 14px; border-radius: 10px;
        border: 1px solid var(--line); background: var(--panel); color: var(--dim);
        font-size: 14px;
      }
      .u-label {
        text-transform: uppercase; letter-spacing: .04em; font-size: 11px;
        font-weight: 600; color: var(--accent);
      }
      .u-sem { color: var(--txt); }
      .u-conf { font-variant-numeric: tabular-nums; }
      .chips { display: flex; flex-wrap: wrap; gap: 6px; }
      .chip {
        padding: 2px 8px; border-radius: 999px; font-size: 12px;
        border: 1px solid var(--line); background: #1f2530; color: var(--txt);
      }

      /* Badge de statut de droits (gestion des droits DAM) */
      .badge {
        padding: 2px 8px; border-radius: 999px; font-size: 12px; white-space: nowrap;
        border: 1px solid var(--line); background: #1f2530; color: var(--dim);
      }
      .badge.ok { border-color: #2e5a36; background: #14241a; color: #8fe0a3; }
      .badge.warn { border-color: #5a3a2e; background: #241a14; color: #e8b08f; }

      /* Barre de filtres explicites actifs (facettes cliquées) */
      .active-filters {
        display: flex; flex-wrap: wrap; align-items: center; gap: 8px;
        margin: 0 2px 16px; padding: 10px 14px; border-radius: 10px;
        border: 1px solid var(--accent); background: #122530;
      }
      .af-label {
        text-transform: uppercase; letter-spacing: .04em; font-size: 11px;
        font-weight: 600; color: var(--accent);
      }
      .af-chip {
        display: inline-flex; align-items: center; gap: 6px;
        padding: 3px 10px; border-radius: 999px; font-size: 13px; cursor: pointer;
        border: 1px solid #2e5a6e; background: #14323f; color: var(--txt);
      }
      .af-chip:hover { border-color: var(--accent); }
      .af-x { color: var(--dim); font-weight: 700; }
      .af-clear {
        margin-left: auto; padding: 3px 10px; border-radius: 999px; font-size: 12px;
        cursor: pointer; border: 1px solid var(--line); background: transparent; color: var(--dim);
      }
      .af-clear:hover { color: var(--txt); border-color: var(--dim); }

      /* Facettes (agrégations par dimension, doc 25 §4.5) */
      .facets {
        display: flex; flex-direction: column; gap: 10px;
        margin: 0 2px 18px; padding: 12px 14px; border-radius: 10px;
        border: 1px solid var(--line); background: var(--panel);
      }
      .facet { display: flex; flex-wrap: wrap; align-items: baseline; gap: 8px; }
      .facet-name {
        text-transform: uppercase; letter-spacing: .04em; font-size: 11px;
        font-weight: 600; color: var(--dim); min-width: 96px;
      }
      .facet-vals { display: flex; flex-wrap: wrap; gap: 6px; }
      .facet-val {
        display: inline-flex; align-items: center; gap: 6px;
        padding: 2px 9px; border-radius: 999px; font-size: 12px;
        border: 1px solid var(--line); background: #1f2530; color: var(--txt);
      }
      button.facet-val { cursor: pointer; }
      button.facet-val:hover { border-color: var(--accent); }
      .facet-val.active { border-color: var(--accent); background: #14323f; color: var(--accent); }
      .facet-val.ro { color: var(--dim); }
      .fc { color: var(--dim); font-variant-numeric: tabular-nums; font-size: 11px; }
      .facet-val.active .fc { color: var(--accent); }

      /* État vide */
      .empty { color: var(--dim); margin: 14px 2px; }
    </style>
  </head>
  <body></body>
</html>
